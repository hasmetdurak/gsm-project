name: GSM CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-lint:
    name: Code Quality & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
          cache: true

      - name: Install Dependencies
        run: go mod download

      - name: Verify Code Formatting
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Go code is not formatted properly. Run gofmt -w ."
            exit 1
          fi

      - name: Run Unit Tests
        run: go test -v ./...

  docker-build-test:
    name: Docker Multistage Build Test
    runs-on: ubuntu-latest
    needs: test-and-lint
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker Image (Dry-Run)
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: gsm-core:latest

  deploy-vps:
    name: Deploy to Dokploy VPS
    runs-on: ubuntu-latest
    needs: docker-build-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      # Dokploy webhook tetikleyerek otomatik dağıtımı başlatıyoruz
      - name: Trigger Dokploy WebHook Deploy
        run: |
          if [ -n "${{ secrets.DOKPLOY_WEBHOOK_URL }}" ]; then
            echo "Triggering Dokploy Webhook..."
            curl -X POST "${{ secrets.DOKPLOY_WEBHOOK_URL }}"
          else
            echo "DOKPLOY_WEBHOOK_URL secret is not set. Skipping automated webhook trigger."
            echo "Dokploy will auto-deploy if GitHub integration is enabled in Dokploy Panel."
          fi
