version: '3.8'

services:
  gsm-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gsm_matrix_core
    ports:
      - "8080:8080"
    restart: unless-stopped
    environment:
      - TZ=Europe/Istanbul
      - PORT=8080
      - ENV=production
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - gsm-network

networks:
  gsm-network:
    driver: bridge
